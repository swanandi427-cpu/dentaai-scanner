<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#D4AF37" />
  <title>Offline — DantaNova</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #D4AF37;
      --gold-dim: #A8860A;
      --bg: #0F172A;
      --surface: #1E293B;
      --text: #F1F5F9;
      --muted: #94A3B8;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      text-align: center;
    }

    /* Logo */
    .logo {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--gold) 0%, #FFF176 50%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.25rem;
    }
    .tagline {
      font-size: 0.75rem;
      color: var(--gold-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }

    /* Icon ring */
    .icon-ring {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      box-shadow: 0 0 32px rgba(212, 175, 55, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      background: rgba(212, 175, 55, 0.06);
      animation: pulse 2.5s ease-in-out infinite;
    }
    .icon-ring svg {
      width: 44px;
      height: 44px;
      stroke: var(--gold);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(212,175,55,0.3); }
      50%       { box-shadow: 0 0 48px rgba(212,175,55,0.6); }
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid rgba(212, 175, 55, 0.25);
      border-radius: 1.5rem;
      padding: 2rem 1.75rem;
      max-width: 420px;
      width: 100%;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: var(--text);
    }
    p {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 0.5rem;
    }
    .hint {
      font-size: 0.8rem;
      color: rgba(212, 175, 55, 0.7);
      margin-top: 0.75rem;
      margin-bottom: 1.75rem;
    }

    /* Button */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, var(--gold), #B8960C);
      color: #0F172A;
      font-weight: 700;
      font-size: 0.9rem;
      padding: 0.7rem 2rem;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      text-decoration: none;
      box-shadow: 0 0 16px rgba(212, 175, 55, 0.4);
    }
    .btn:hover { opacity: 0.88; transform: scale(1.02); }
    .btn:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="logo">DantaNova</div>
  <div class="tagline">Because Every Smile Matters The Most</div>

  <div class="icon-ring">
    <!-- Wifi-off icon -->
    <svg viewBox="0 0 24 24">
      <line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <circle cx="12" cy="20" r="1"/>
    </svg>
  </div>

  <div class="card">
    <h1>You're Offline</h1>
    <p>Check your internet connection and try again.</p>
    <p class="hint">💡 Your recent scan results may still be available in <strong>History</strong> if you saved them while online.</p>
    <button class="btn" onclick="window.location.reload()">
      <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"/>
        <path d="M3.51 15a9 9 0 1 0 .49-3.46"/>
      </svg>
      Try Again
    </button>
  </div>
</body>
</html>
